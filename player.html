<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player UI Mock</title>
  <style>
    :root {
      --card-radius: 34px;
      --stroke: rgba(255, 255, 255, 0.22);
      --text: rgba(255, 255, 255, 0.96);
      --muted: rgba(255, 255, 255, 0.78);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
      --blur: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1310;
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .player {
      position: relative;
      width: 598px;
      height: 351px;
      border-radius: var(--card-radius);
      overflow: hidden;
      background-color: #171d19;
      background-image:
        linear-gradient(180deg, rgba(10, 12, 14, 0.14), rgba(10, 12, 14, 0.52)),
        var(--cover-image, linear-gradient(135deg, #2a332f, #101412 64%, #070908));
      background-size: cover;
      background-position: center;
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .player::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 35%),
        linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.18));
      z-index: 0;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .track-chip {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 183px;
      height: 53px;
      border: 0;
      background: transparent;
      padding: 0;
      display: block;
      cursor: default;
    }

    .track-chip svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .track-chip__shell {
      fill: rgba(255,255,255,0.08);
      stroke: rgba(255,255,255,0.32);
      stroke-width: 1;
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      filter: drop-shadow(0 10px 22px rgba(0,0,0,0.20));
    }

    .track-chip__status {
      fill: rgba(255,255,255,0.82);
      font-size: 7px;
      font-weight: 400;
      text-anchor: middle;
    }

    .track-chip__title {
      fill: rgba(255,255,255,0.96);
      font-size: 12px;
      font-weight: 400;
      text-anchor: middle;
    }

    .track-chip__artist {
      fill: rgba(255,255,255,0.9);
      font-size: 10px;
      font-weight: 400;
      text-anchor: middle;
    }

    .playlist-btn {
      position: absolute;
      top: 15px;
      right: 14px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.34);
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 10px 30px rgba(0, 0, 0, 0.18);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
      padding: 0;
    }

    .playlist-btn:hover {
      transform: scale(1.04);
    }

    .playlist-btn:active {
      transform: scale(0.98);
    }

    .playlist-btn svg {
      width: 22px;
      height: 22px;
      opacity: 0.95;
      pointer-events: none;
      display: block;
      fill: none;
      stroke: rgba(255, 255, 255, 0.92);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .center-control {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .play-toggle {
      position: relative;
      pointer-events: auto;
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      background: transparent;
      border: 0;
      cursor: pointer;
      padding: 0;
    }

    .play-toggle:hover {
      transform: none;
    }

    .play-toggle:active {
      transform: none;
    }

    .play-toggle svg {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 76px;
      height: 76px;
      display: block;
      filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.18));
      transition: opacity 120ms ease;
    }

    .play-icon {
      opacity: 1;
    }

    .pause-icon {
      opacity: 0;
    }

    .player.is-playing .play-icon {
      opacity: 0;
    }

    .player.is-playing .pause-icon {
      opacity: 1;
    }

    .bottom-controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 78px;
    }

    .control-btn {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 120ms ease, opacity 120ms ease;
      opacity: 0.7;
      color: rgba(255, 255, 255, 0.82);
    }

    .control-btn:hover {
      transform: scale(1.08);
      opacity: 0.95;
    }

    .control-btn:active {
      transform: scale(0.96);
    }

    .control-btn svg {
      display: block;
      user-select: none;
      pointer-events: none;
      fill: none;
    }

    .control-btn--prev svg,
    .control-btn--next svg {
      width: 49px;
      height: 30px;
    }

    .control-btn--prev {
      transform: translateX(-2px);
    }

    .control-btn--next {
      transform: translateX(2px);
    }

    .control-btn--prev:hover,
    .control-btn--next:hover {
      transform: scale(1.08);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="player" id="player">
    <div class="hud">
      <div class="track-chip" aria-label="Информация о треке">
        <svg viewBox="0 0 183 53" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
          <defs>
            <linearGradient id="chipFill" x1="0" y1="0" x2="183" y2="53" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="rgba(255,255,255,0.14)" />
              <stop offset="100%" stop-color="rgba(255,255,255,0.06)" />
            </linearGradient>
          </defs>
          <rect class="track-chip__shell" x="0.5" y="0.5" width="182" height="52" rx="26" fill="url(#chipFill)" />
          <text class="track-chip__status" id="trackStatus" x="91.5" y="12">Статус</text>
          <text class="track-chip__title" id="trackTitle" x="91.5" y="28">Название трека</text>
          <text class="track-chip__artist" id="trackArtist" x="91.5" y="42">Исполнитель</text>
        </svg>
      </div>

      <button class="playlist-btn" id="playlistBtn" type="button" aria-label="Перейти к плейлистам">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 6h14M5 12h14M5 18h9" />
          <path d="M17 16l2 2 3-3" />
        </svg>
      </button>

      <div class="center-control">
        <button class="play-toggle" id="playToggle" type="button" aria-label="Воспроизвести или поставить на паузу">
          <svg class="play-icon" viewBox="0 0 76 76" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M24 16L56 38L24 60V16Z" fill="rgba(255,255,255,0.40)"/>
          </svg>
          <svg class="pause-icon" viewBox="0 0 76 76" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="22" y="16" width="10" height="44" rx="5" fill="rgba(255,255,255,0.40)"/>
            <rect x="44" y="16" width="10" height="44" rx="5" fill="rgba(255,255,255,0.40)"/>
          </svg>
        </button>
      </div>

      <div class="bottom-controls">
        <button class="control-btn control-btn--prev" id="prevBtn" type="button" aria-label="Назад">
          <svg viewBox="0 0 49 30" aria-hidden="true">
            <path d="M28 6L17 15L28 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M35 6L24 15L35 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
          </svg>
        </button>
        <button class="control-btn control-btn--next" id="nextBtn" type="button" aria-label="Вперёд">
          <svg viewBox="0 0 49 30" aria-hidden="true">
            <path d="M21 6L32 15L21 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 6L25 15L14 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
          </svg>
        </button>
      </div>
    </div>

  <audio id="audio" preload="metadata"></audio>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="module" src="./player.js"></script>
</body>
</html>
