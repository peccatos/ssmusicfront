<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standalone Player Widget</title>
    <link rel="stylesheet" href="./player-widget.css" />
  </head>
  <body class="eva-shell">
    <div id="widget-root"></div>

    <script type="module">
      import { createPlayerWidget, createStaticTrackSource } from "./player-widget.js";

      const source = createStaticTrackSource(
        [
          {
            id: "local:deftones-change",
            title: "Change (In the House of Flies)",
            artist: "Deftones",
          },
        ],
        {
          playables: [
            {
              trackId: "local:deftones-change",
              url: "http://127.0.0.1:5173/11%20Deftones%20-%20Change%20(In%20the%20House%20of%20Flies).mp3",
              kind: "asset",
            },
          ],
          debug: {
            mode: "standalone-widget",
            transport: "static-file",
            independent: true,
          },
        }
      );

      createPlayerWidget({
        root: document.getElementById("widget-root"),
        source,
      });
    </script>
  </body>
</html>
